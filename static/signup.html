<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>회원가입 - Tracker Admin</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .signup-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      margin: 0 0 24px 0;
      font-size: 24px;
      font-weight: 600;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: #020617;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 12px;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      background: #374151;
      cursor: not-allowed;
    }

    .error {
      color: var(--danger);
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      color: var(--success);
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .link {
      text-align: center;
      margin-top: 16px;
    }

    .link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
    }

    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h1>회원가입</h1>
    <form id="signupForm">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" required autocomplete="username" minlength="3" maxlength="50">
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="4">
      </div>
      <div class="form-group">
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" name="passwordConfirm" required autocomplete="new-password" minlength="4">
      </div>
      <div class="error" id="error"></div>
      <div class="success" id="success"></div>
      <button type="submit" id="submitBtn">회원가입</button>
    </form>
    <div class="link">
      <a href="/static/login.html">이미 계정이 있으신가요? 로그인</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const errorDiv = document.getElementById('error');
    const successDiv = document.getElementById('success');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      // 초기화
      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');

      // 유효성 검사
      if (username.length < 3) {
        errorDiv.textContent = '아이디는 최소 3자 이상이어야 합니다.';
        errorDiv.classList.add('show');
        return;
      }

      if (password.length < 4) {
        errorDiv.textContent = '비밀번호는 최소 4자 이상이어야 합니다.';
        errorDiv.classList.add('show');
        return;
      }

      if (password !== passwordConfirm) {
        errorDiv.textContent = '비밀번호가 일치하지 않습니다.';
        errorDiv.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '가입 중...';

      try {
        const response = await fetch('/api/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // 회원가입 성공
          successDiv.textContent = data.message || '회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.';
          successDiv.classList.add('show');
          
          // 2초 후 로그인 페이지로 이동
          setTimeout(() => {
            window.location.href = '/static/login.html';
          }, 2000);
        } else {
          // 회원가입 실패
          errorDiv.textContent = data.message || '회원가입에 실패했습니다.';
          errorDiv.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = '회원가입';
        }
      } catch (error) {
        errorDiv.textContent = '서버 오류가 발생했습니다.';
        errorDiv.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = '회원가입';
      }
    });
  </script>
</body>
</html>
