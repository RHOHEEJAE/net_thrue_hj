<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>로그인 - Tracker Admin</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      margin: 0 0 24px 0;
      font-size: 24px;
      font-weight: 600;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: #020617;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      background: #374151;
      cursor: not-allowed;
    }

    .error {
      color: var(--danger);
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>로그인</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div class="error" id="error"></div>
      <button type="submit" id="submitBtn">로그인</button>
    </form>
    <div class="link" style="text-align: center; margin-top: 16px;">
      <a href="/static/signup.html" style="color: var(--accent); text-decoration: none; font-size: 14px;">계정이 없으신가요? 회원가입</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = '로그인 중...';
      errorDiv.classList.remove('show');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // 로그인 성공 - 권한에 따라 관리자 페이지 또는 대시보드로 이동
          window.location.href = data.redirectUrl || '/static/dashboard.html';
        } else {
          // 로그인 실패
          errorDiv.textContent = data.message || '로그인에 실패했습니다.';
          errorDiv.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = '로그인';
        }
      } catch (error) {
        errorDiv.textContent = '서버 오류가 발생했습니다.';
        errorDiv.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
